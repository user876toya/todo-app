<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>

    <link rel="stylesheet" th:href="@{/css/tasks.css}">
</head>

<body>
    <h1>タスク一覧</h1>

    <ul>
        <li class="p-tasklist_item" th:each="task : ${tasks}">
            <span th:text="${task.content}"></span>

        </li>
    </ul>

</body>

</html>
